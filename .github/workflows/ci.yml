name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend:
    name: Backend
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/requirements-dev.txt

      - name: Install dependencies
        working-directory: apps/api
        shell: pwsh
        run: |
          python -m pip install -r requirements-dev.txt
          python -m pip install -e .

      - name: Architecture guard
        shell: pwsh
        run: |
          python tools/check_architecture.py
          python -m pytest tools/test_check_architecture.py -q

      - name: Static analysis
        working-directory: apps/api
        shell: pwsh
        run: |
          python -m ruff check src tests
          python -m mypy
          $env:PYTHONPATH = "src"
          lint-imports

      - name: Test
        working-directory: apps/api
        shell: pwsh
        run: pytest

  frontend:
    name: Frontend
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Use project npm
        shell: pwsh
        run: npm install --global npm@11.11.0

      - name: Install dependencies
        working-directory: apps/web
        shell: pwsh
        run: npm ci --ignore-scripts

      - name: Lint
        working-directory: apps/web
        shell: pwsh
        run: npm run lint

      - name: Typecheck
        working-directory: apps/web
        shell: pwsh
        run: npm run typecheck

      - name: Test
        working-directory: apps/web
        shell: pwsh
        run: npm run test

      - name: Build
        working-directory: apps/web
        shell: pwsh
        run: npm run build

      - name: Install Playwright browser
        working-directory: apps/web
        shell: pwsh
        run: npx playwright install chromium

      - name: E2E smoke
        working-directory: apps/web
        shell: pwsh
        run: npm run e2e