services:
  - type: web
    name: memory-anki-api
    runtime: python
    plan: free
    rootDir: apps/api
    buildCommand: "pip install -r requirements.txt && pip install -e ."
    startCommand: "python -m uvicorn --app-dir src memory_anki.app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: MEMORY_ANKI_RUN_MODE
        value: serve
      - key: MEMORY_ANKI_DEPLOY_TARGET
        value: cloud
      - key: MEMORY_ANKI_CORS_ORIGINS
        sync: false
      - key: MEMORY_ANKI_DATABASE_URL
        sync: false
      - key: DASHSCOPE_API_KEY
        sync: false
      - key: ZHIPU_API_KEY
        sync: false
      - key: SILICONFLOW_API_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
