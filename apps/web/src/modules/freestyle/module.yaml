{
  "name": "freestyle",
  "owns": [
    "training round",
    "answer completion rules",
    "round presentation state",
    "immersive feed config",
    "queue skip and refresh rules"
  ],
  "forbids": ["browser scrolling side effects", "navigation", "session persistence adapters"],
  "publicEntry": "src/modules/freestyle/public.ts",
  "workflows": ["FreestyleTrainingMachine"],
  "ports": [],
  "events": ["freestyle.round.completed"],
  "dependencies": ["sessions"],
  "invariants": [
    "SCROLL_SETTLED cannot complete a round",
    "all quiz cards must be resolved",
    "browse-only does not write FSRS",
    "queue rebuild preserves completed and skip state"
  ],
  "requiredTests": [
    "trainingRound.test.ts",
    "freestyleTrainingMachine.test.ts",
    "feedConfig.test.ts"
  ]
}
