<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#020617" />
    <title>随心模式离线</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #020617;
        color: #e5e7eb;
      }
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      main {
        max-width: 360px;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 24px;
      }
      p {
        margin: 0;
        color: #a1a1aa;
        line-height: 1.7;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>离线中</h1>
      <p>如果之前已经打开过随心模式，返回 /freestyle 可以继续使用缓存题卡。联网后，本地保存的学习记录会自动同步。</p>
    </main>
  </body>
</html>
