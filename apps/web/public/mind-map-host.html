<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Memory Anki Mind Map Host</title>
    <script>
      window.externalPublicPath = '/mind-map/dist/'
      window.takeOverApp = true
      window.localStorage.setItem('webUseTip', '1')
    </script>
    <link rel="icon" href="/mind-map/dist/logo.ico" />
    <link rel="stylesheet" href="/mind-map/dist/css/chunk-vendors.css" />
    <link rel="stylesheet" href="/mind-map/dist/css/app.css" />
    <link rel="stylesheet" href="/mind-map-host.css" />
  </head>
  <body>
    <div id="app"></div>
    <div class="memory-anki-selection-drag-layer" hidden>
      <svg width="100%" height="100%" aria-hidden="true">
        <path
          class="memory-anki-selection-drag-line"
          fill="none"
          stroke="#5ec8f8"
          stroke-width="2.5"
          stroke-linecap="round"
        ></path>
      </svg>
      <div class="memory-anki-selection-drag-slot" hidden></div>
      <div class="memory-anki-selection-drag-proxy" hidden></div>
    </div>
    <div class="memory-anki-feedback-ripple-layer" aria-hidden="true"></div>
    <script src="/mind-map-host-bridge.js"></script>
    <script src="/mind-map/dist/js/chunk-vendors.js"></script>
    <script src="/mind-map/dist/js/app.js"></script>
    <script>
      bootMindMapHost()
    </script>
  </body>
</html>
