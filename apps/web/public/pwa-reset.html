<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#020617" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>刷新 Memory Anki PWA</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #020617;
        color: #f8fafc;
      }

      body {
        margin: 0;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        padding: 24px;
        box-sizing: border-box;
      }

      main {
        width: min(100%, 420px);
        border: 1px solid rgba(148, 163, 184, 0.32);
        border-radius: 18px;
        background: rgba(15, 23, 42, 0.9);
        padding: 22px;
        box-shadow: 0 20px 80px rgba(0, 0, 0, 0.36);
      }

      h1 {
        margin: 0 0 10px;
        font-size: 22px;
      }

      p {
        margin: 8px 0 0;
        color: #cbd5e1;
        line-height: 1.6;
      }

      .status {
        margin-top: 16px;
        border-radius: 12px;
        background: rgba(15, 23, 42, 0.95);
        padding: 12px;
        color: #a7f3d0;
        font-size: 14px;
        line-height: 1.5;
      }

      a,
      button {
        margin-top: 18px;
        display: inline-flex;
        min-height: 44px;
        align-items: center;
        justify-content: center;
        border: 0;
        border-radius: 999px;
        background: #34d399;
        color: #020617;
        padding: 0 18px;
        font: inherit;
        font-weight: 700;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>刷新 Memory Anki PWA</h1>
      <p>正在清理 Memory Anki PWA 的离线缓存和 Service Worker。不会清除 localStorage / IndexedDB 中的学习进度。</p>
      <div id="status" class="status">准备清理...</div>
      <a id="open" href="/freestyle" hidden>进入随心模式</a>
    </main>
    <script>
      async function resetPwa() {
        const status = document.getElementById('status')
        const open = document.getElementById('open')
        try {
          if ('serviceWorker' in navigator) {
            const registrations = await navigator.serviceWorker.getRegistrations()
            await Promise.all(
              registrations
                .filter((registration) => {
                  const scopePath = new URL(registration.scope).pathname
                  return scopePath === '/'
                })
                .map((registration) => registration.unregister()),
            )
          }
          if ('caches' in window) {
            const keys = await caches.keys()
            await Promise.all(
              keys
                .filter(
                  (key) =>
                    key.startsWith('memory-anki-pwa-') ||
                    key.startsWith('memory-anki-mobile-'),
                )
                .map((key) => caches.delete(key)),
            )
          }
          status.textContent = '清理完成。请点下面按钮重新进入，或关闭主屏幕 PWA 后再打开。'
        } catch (error) {
          status.textContent = '清理时遇到问题：' + (error && error.message ? error.message : String(error))
        } finally {
          open.hidden = false
        }
      }

      resetPwa()
    </script>
  </body>
</html>
