{
  "schemaVersion": 1,
  "architecture": {
    "backend": "modular-monolith",
    "frontend": "app-pages-widgets-features-entities-shared",
    "databaseSchemaChanges": true
  },
  "backend": {
    "targetLayers": [
      "domain",
      "application",
      "ports",
      "infrastructure",
      "presentation"
    ],
    "contexts": {
      "ai_learning": {
        "status": "migrated"
      },
      "batch_generation": {
        "status": "migrated",
        "publicEntry": "memory_anki.modules.batch_generation.application"
      },
      "backups": {
        "status": "migrated",
        "publicEntry": "memory_anki.modules.backups.api"
      },
      "dashboard": {
        "status": "migrated"
      },
      "english": {
        "status": "migrated",
        "publicEntry": "memory_anki.modules.english.api"
      },
      "english_reading": {
        "status": "migrated",
        "publicEntry": "memory_anki.modules.english_reading.api"
      },
      "freestyle": {
        "status": "migrated"
      },
      "knowledge": {
        "status": "migrated"
      },
      "mindmap": {
        "status": "retired",
        "replacedBy": [
          "mindmap_document",
          "mindmap_learning"
        ]
      },
      "mindmap_document": {
        "status": "migrated",
        "publicEntry": "memory_anki.modules.mindmap_document.api"
      },
      "mindmap_learning": {
        "status": "migrated"
      },
      "palace_quiz": {
        "status": "migrated",
        "publicEntry": "memory_anki.modules.palace_quiz.api"
      },
      "palaces": {
        "status": "migrated",
        "publicEntry": "memory_anki.modules.palaces.api"
      },
      "pdf_library": {
        "status": "migrated",
        "publicEntry": "memory_anki.modules.pdf_library.api"
      },
      "reviews": {
        "status": "migrated",
        "publicEntry": "memory_anki.modules.reviews.api"
      },
      "search": {
        "status": "migrated"
      },
      "sessions": {
        "status": "migrated",
        "publicEntry": "memory_anki.modules.sessions.api"
      },
      "settings": {
        "status": "migrated",
        "publicEntry": "memory_anki.modules.settings.api"
      }
    },
    "allowedCrossContextDependencies": {
      "ai_learning": [
        "settings"
      ],
      "batch_generation": [],
      "backups": [
        "mindmap_document"
      ],
      "dashboard": [
        "palaces",
        "reviews",
        "sessions"
      ],
      "english": [
        "reviews",
        "sessions",
        "settings"
      ],
      "english_reading": [
        "reviews",
        "sessions",
        "settings"
      ],
      "freestyle": [
        "english",
        "english_reading",
        "palace_quiz",
        "palaces",
        "reviews"
      ],
      "knowledge": [
        "backups",
        "mindmap_document",
        "palaces",
        "reviews"
      ],
      "palace_quiz": [
        "backups",
        "mindmap_document",
        "palaces",
        "settings"
      ],
      "palaces": [
        "backups",
        "mindmap_document",
        "pdf_library",
        "reviews",
        "sessions",
        "settings"
      ],
      "pdf_library": [],
      "reviews": [
        "mindmap_document",
        "mindmap_learning",
        "palaces",
        "sessions"
      ],
      "search": [
        "palaces"
      ],
      "sessions": [],
      "settings": [
        "backups",
        "reviews"
      ]
    },
    "unitOfWorkManagedUseCases": [
      "modules/knowledge/application/chapter_service.py",
      "modules/knowledge/application/editor_state_service.py",
      "modules/knowledge/application/subject_service.py",
      "modules/palaces/application/attachment_service.py",
      "modules/palaces/application/editor_state_service.py",
      "modules/palaces/application/import_export_service.py",
      "modules/palaces/application/knowledge_binding_service.py",
      "modules/palaces/application/palace_service.py",
      "modules/palaces/application/palace_template_service.py",
      "modules/palaces/application/segment_management_service.py",
      "modules/palace_quiz/application/question_mutation_commands.py",
      "modules/sessions/application/study_session_commands.py"
    ]
  },
  "frontend": {
    "targetLayers": [
      "app",
      "pages",
      "widgets",
      "features",
      "entities",
      "shared"
    ],
    "allowedFeatureDependencies": {
      "english": [
        "english-reading",
        "english-shell"
      ],
      "english-reading": [
        "english",
        "english-shell"
      ],
      "english-shell": [],
      "freestyle": [],
      "knowledge": [],
      "mindmap-import": [],
      "mini-palace": [],
      "palace-catalog": [],
      "palace-edit": [],
      "palace-quiz": [],
      "profile": [],
      "review": []
    }
  },
  "runtime": {
    "ports": {
      "NavigationPort": {
        "owner": "app/runtime",
        "adapter": "platform/browser",
        "capabilities": [
          "push",
          "replace",
          "back"
        ]
      },
      "OverlayCoordinator": {
        "owner": "app/runtime",
        "adapter": "app/composition",
        "capabilities": [
          "open",
          "close",
          "closeReason"
        ]
      },
      "PresentationPort": {
        "owner": "modules/mindmap/application",
        "adapter": "platform/browser/browserPresentationPort.ts",
        "capabilities": [
          "fullscreen",
          "viewportLock",
          "escape",
          "layoutSchedule"
        ]
      },
      "SessionPort": {
        "owner": "modules/sessions/application",
        "adapter": "modules/sessions/infrastructure",
        "capabilities": [
          "identity",
          "timing",
          "pause",
          "complete",
          "idempotentSave"
        ]
      },
      "PersistencePort": {
        "owner": "app/runtime",
        "adapter": "platform/persistence",
        "capabilities": [
          "versionedLocal",
          "versionedSession",
          "offlineQueue",
          "migration"
        ]
      },
      "PwaRuntimePort": {
        "owner": "app/runtime",
        "adapter": "platform/pwa",
        "capabilities": [
          "release",
          "serviceWorker",
          "cacheReset",
          "recovery"
        ]
      },
      "ObservabilityPort": {
        "owner": "app/runtime",
        "adapter": "platform/observability",
        "capabilities": [
          "event",
          "transition",
          "request",
          "errorContext"
        ]
      }
    },
    "forbiddenInBusinessPresentation": [
      "window.history",
      "window.location",
      "requestFullscreen",
      "exitFullscreen",
      "localStorage",
      "sessionStorage",
      "fetch",
      "navigator.serviceWorker"
    ],
    "useCases": {
      "freestyle.completeRound": {
        "owner": "freestyle",
        "workflow": "FreestyleTrainingMachine",
        "guard": "canCompleteRound",
        "tests": [
          "trainingRound.test.ts",
          "freestyleTrainingMachine.test.ts"
        ]
      },
      "mindmap.enterFullscreen": {
        "owner": "mindmap",
        "workflow": "MindMapPresentationMachine",
        "port": "PresentationPort",
        "tests": [
          "mindMapPresentationMachine.test.ts",
          "MindMapEditorSurface.test.tsx"
        ]
      },
      "mindmap.exitFullscreen": {
        "owner": "mindmap",
        "workflow": "MindMapPresentationMachine",
        "port": "PresentationPort",
        "invariants": [
          "does not navigate",
          "does not close parent overlay"
        ]
      }
    },
    "events": {
      "freestyle.round.completed": {
        "owner": "freestyle",
        "producer": "FreestyleTrainingMachine",
        "consumers": [
          "sessions"
        ],
        "precondition": "canCompleteRound"
      },
      "mindmap.presentation.entered": {
        "owner": "mindmap",
        "producer": "MindMapPresentationMachine",
        "consumers": []
      },
      "mindmap.presentation.exited": {
        "owner": "mindmap",
        "producer": "MindMapPresentationMachine",
        "consumers": [],
        "forbiddenConsequences": [
          "navigation.back",
          "overlay.close"
        ]
      }
    },
    "frontendModules": {
      "freestyle": {
        "publicEntry": "src/modules/freestyle/public.ts",
        "workflow": "FreestyleTrainingMachine"
      },
      "mindmap": {
        "publicEntry": "src/modules/mindmap/public.ts",
        "workflow": "MindMapPresentationMachine"
      }
    }
  }
}
