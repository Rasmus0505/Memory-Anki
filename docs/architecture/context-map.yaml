{
  "schemaVersion": 1,
  "architecture": {
    "backend": "modular-monolith",
    "frontend": "app-pages-widgets-modules-shared",
    "databaseSchemaChanges": true
  },
  "backend": {
    "targetLayers": [
      "domain",
      "application",
      "ports",
      "infrastructure",
      "presentation"
    ],
    "contexts": {
      "ai_learning": {
        "status": "migrated"
      },
      "batch_generation": {
        "status": "migrated",
        "publicEntry": "memory_anki.modules.batch_generation.application"
      },
      "backups": {
        "status": "migrated",
        "publicEntry": "memory_anki.modules.backups.api"
      },
      "content": {
        "status": "migrated",
        "publicEntry": "memory_anki.modules.content.api"
      },
      "dashboard": {
        "status": "migrated"
      },
      "english": {
        "status": "migrated",
        "publicEntry": "memory_anki.modules.english.api"
      },
      "english_reading": {
        "status": "migrated",
        "publicEntry": "memory_anki.modules.english_reading.api"
      },
      "knowledge": {
        "status": "migrated"
      },
      "memory": {
        "status": "migrated",
        "publicEntry": "memory_anki.modules.memory.api"
      },
      "mindmap": {
        "status": "retired",
        "replacedBy": [
          "mindmap_document",
          "mindmap_learning"
        ]
      },
      "mindmap_document": {
        "status": "migrated",
        "publicEntry": "memory_anki.modules.mindmap_document.api"
      },
      "mindmap_learning": {
        "status": "migrated"
      },
      "pdf_library": {
        "status": "migrated",
        "publicEntry": "memory_anki.modules.pdf_library.api"
      },
      "practice": {
        "status": "migrated",
        "publicEntry": "memory_anki.modules.practice.api"
      },
      "produce": {
        "status": "migrated",
        "publicEntry": "memory_anki.modules.produce.api"
      },
      "quiz": {
        "status": "migrated",
        "publicEntry": "memory_anki.modules.quiz.api"
      },
      "search": {
        "status": "migrated"
      },
      "session": {
        "status": "migrated",
        "publicEntry": "memory_anki.modules.session.api"
      },
      "settings": {
        "status": "migrated",
        "publicEntry": "memory_anki.modules.settings.api"
      },
      "freestyle": {
        "status": "retired",
        "replacedBy": [
          "practice"
        ]
      },
      "palaces": {
        "status": "retired",
        "replacedBy": [
          "content"
        ]
      },
      "palace_quiz": {
        "status": "retired",
        "replacedBy": [
          "quiz"
        ]
      },
      "reviews": {
        "status": "retired",
        "replacedBy": [
          "memory"
        ]
      },
      "sessions": {
        "status": "retired",
        "replacedBy": [
          "session"
        ]
      }
    },
    "allowedCrossContextDependencies": {
      "ai_learning": [
        "settings"
      ],
      "batch_generation": [],
      "backups": [
        "mindmap_document"
      ],
      "content": [
        "backups",
        "memory",
        "mindmap_document",
        "produce",
        "session",
        "settings",
        "pdf_library"
      ],
      "dashboard": [
        "content",
        "memory",
        "session"
      ],
      "english": [
        "memory",
        "session",
        "settings"
      ],
      "english_reading": [
        "memory",
        "session",
        "settings"
      ],
      "knowledge": [
        "backups",
        "content",
        "memory",
        "mindmap_document"
      ],
      "memory": [
        "content",
        "mindmap_document",
        "mindmap_learning",
        "session"
      ],
      "pdf_library": [],
      "practice": [
        "content",
        "english",
        "english_reading",
        "memory",
        "quiz",
        "session"
      ],
      "produce": [
        "backups",
        "content",
        "mindmap_document",
        "pdf_library",
        "settings"
      ],
      "quiz": [
        "backups",
        "content",
        "mindmap_document",
        "settings"
      ],
      "search": [
        "content"
      ],
      "session": [],
      "settings": [
        "backups",
        "memory"
      ],
      "mindmap_document": [],
      "mindmap_learning": []
    },
    "unitOfWorkManagedUseCases": [
      "modules/knowledge/application/chapter_service.py",
      "modules/knowledge/application/editor_state_service.py",
      "modules/knowledge/application/subject_service.py",
      "modules/content/application/attachment_service.py",
      "modules/content/application/editor_state_service.py",
      "modules/content/application/import_export_service.py",
      "modules/content/application/knowledge_binding_service.py",
      "modules/content/application/palace_service.py",
      "modules/content/application/palace_template_service.py",
      "modules/content/application/segment_management_service.py",
      "modules/quiz/application/question_mutation_commands.py",
      "modules/session/application/study_session_commands.py"
    ]
  },
  "frontend": {
    "targetLayers": [
      "app",
      "pages",
      "widgets",
      "modules",
      "shared",
      "platform"
    ],
    "allowedFeatureDependencies": {}
  },
  "runtime": {
    "ports": {
      "NavigationPort": {
        "owner": "app/runtime",
        "adapter": "platform/browser",
        "capabilities": [
          "push",
          "replace",
          "back"
        ]
      },
      "OverlayCoordinator": {
        "owner": "app/runtime",
        "adapter": "app/composition",
        "capabilities": [
          "open",
          "close",
          "closeReason"
        ]
      },
      "PresentationPort": {
        "owner": "modules/mindmap/application",
        "adapter": "platform/browser/browserPresentationPort.ts",
        "capabilities": [
          "fullscreen",
          "viewportLock",
          "escape",
          "layoutSchedule"
        ]
      },
      "SessionPort": {
        "owner": "modules/session/application",
        "adapter": "modules/session/infrastructure",
        "capabilities": [
          "identity",
          "timing",
          "pause",
          "complete",
          "idempotentSave"
        ]
      },
      "PersistencePort": {
        "owner": "app/runtime",
        "adapter": "platform/persistence",
        "capabilities": [
          "versionedLocal",
          "versionedSession",
          "offlineQueue",
          "migration"
        ]
      },
      "PwaRuntimePort": {
        "owner": "app/runtime",
        "adapter": "platform/pwa",
        "capabilities": [
          "release",
          "serviceWorker",
          "cacheReset",
          "recovery"
        ]
      },
      "ObservabilityPort": {
        "owner": "app/runtime",
        "adapter": "platform/observability",
        "capabilities": [
          "event",
          "transition",
          "request",
          "errorContext"
        ]
      }
    },
    "forbiddenInBusinessPresentation": [
      "window.history",
      "window.location",
      "requestFullscreen",
      "exitFullscreen",
      "localStorage",
      "sessionStorage",
      "fetch",
      "navigator.serviceWorker"
    ],
    "useCases": {
      "practice.completeRound": {
        "owner": "practice",
        "workflow": "FreestyleTrainingMachine",
        "guard": "canCompleteRound",
        "tests": [
          "trainingRound.test.ts",
          "freestyleTrainingMachine.test.ts"
        ]
      },
      "practice.buildImmersiveQueue": {
        "owner": "practice",
        "facades": [
          "content.api",
          "memory.api",
          "quiz.api"
        ],
        "endpoint": "POST /api/v1/freestyle/queue/build",
        "tests": [
          "test_freestyle_branch_units.py",
          "feedConfig.test.ts"
        ]
      },
      "mindmap.enterFullscreen": {
        "owner": "mindmap",
        "workflow": "MindMapPresentationMachine",
        "port": "PresentationPort",
        "tests": [
          "mindMapPresentationMachine.test.ts",
          "MindMapEditorSurface.test.tsx"
        ]
      },
      "mindmap.exitFullscreen": {
        "owner": "mindmap",
        "workflow": "MindMapPresentationMachine",
        "port": "PresentationPort",
        "invariants": [
          "does not navigate",
          "does not close parent overlay"
        ]
      }
    },
    "events": {
      "freestyle.round.completed": {
        "owner": "practice",
        "producer": "FreestyleTrainingMachine",
        "consumers": [
          "session"
        ],
        "precondition": "canCompleteRound"
      },
      "mindmap.presentation.entered": {
        "owner": "mindmap",
        "producer": "MindMapPresentationMachine",
        "consumers": []
      },
      "mindmap.presentation.exited": {
        "owner": "mindmap",
        "producer": "MindMapPresentationMachine",
        "consumers": [],
        "forbiddenConsequences": [
          "navigation.back",
          "overlay.close"
        ]
      }
    },
    "frontendModules": {
      "practice": {
        "publicEntry": "src/modules/practice/public.ts",
        "workflow": "FreestyleTrainingMachine"
      },
      "mindmap": {
        "publicEntry": "src/modules/mindmap/public.ts",
        "workflow": "MindMapPresentationMachine"
      }
    }
  }
}
