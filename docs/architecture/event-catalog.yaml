{
  "schemaVersion": 1,
  "events": {
    "freestyle.round.completed": {
      "owner": "freestyle",
      "producer": "FreestyleTrainingMachine",
      "consumers": [
        "sessions"
      ],
      "precondition": "canCompleteRound"
    },
    "mindmap.presentation.entered": {
      "owner": "mindmap",
      "producer": "MindMapPresentationMachine",
      "consumers": []
    },
    "mindmap.presentation.exited": {
      "owner": "mindmap",
      "producer": "MindMapPresentationMachine",
      "consumers": [],
      "forbiddenConsequences": [
        "navigation.back",
        "overlay.close"
      ]
    }
  }
}
